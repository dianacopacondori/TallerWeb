<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
        body{
            display: flex;
            justify-content: center;
            background-image: url(login_imgjpg.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            
        }
        .card-login{
            backdrop-filter: blur(4px);
            width: 400px;
            margin-top: 150px;
            flex-direction: column;
            border: 3px solid blanchedalmond;
            border-radius: 10px;
            padding: 40px;
            font-family: "Montserrat", sans-serif;
        }
        .form_group{
            padding: 10px;
        }
        .form_group label{
            font-size: 15px ;
            font-weight: bold;
            color: #f0f0f0 ;

        }
        h1{
            text-align: center;
            color: #bcbf32;
        }
        input[type="password"],
        input[type="text"],
        input[type="submit"]{
            border: 1px solid;
            border-radius: 10px;
            padding: 10px;
        }
        input[type="password"]:focus{
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.5);
        }
        .login_google,.login_face{
            border: 2px solid rgb(124, 120, 120);
            border-radius: 10px;
            background-color: aliceblue;
            display: flex;
            margin-bottom: 10px;
        }
        .icon-google{
            background-image: url(icons8-logo-de-google-48.png);
            background-repeat: no-repeat;
            background-position: center; /* Centra la imagen dentro del espacio */
            background-size: contain;    /* Escala la imagen para que quepa completa */
            width: 30px; 
            height: 30px;
            margin: 9px 40px;
        }
        .icon_face{
            background-image: url(icons8-facebook-nuevo-50.png);
            background-repeat: no-repeat;
            background-position: center; /* Centra la imagen dentro del espacio */
            background-size: contain;    /* Escala la imagen para que quepa completa */
            width: 30px; 
            height: 30px;
            margin: 9px 40px;
        }


    </style>
</head>
<body>
<div class="card-login">
    <form>
        <h1>Iniciar Sesión</h1>
        <div class="form_group">
            <label for="user">Usuario:</label>
            <input type="text" id="user" placeholder="Usuario">
        </div>
        <div class="form_group">
            <label for="">Contraseña:</label>
            <input type="password" placeholder="Contraseña">
        </div>
        <div class="form_group">
            <input type="submit" value="Iniciar Sesion">
            <a href="index.html">Pagina</a>
        </div>
    </form>
    <div class="login_terceros">
        <div class="login_google">
            <div class="icon-google"></div>
            <p>Iniciar Sesion con Google</p>
        </div>
        <div class="login_face">
            <div class="icon_face"></div>
            <p>Inicar sesion con Facebook</p>
        </div>
    </div>
</div>

</body>
</html>
