<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Pokémon Cafe</title>
    <link
      rel="icon"
      type="image/png"
      href="../main_Page/img/img_main/pokeCafe_logo.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/paginas/registrar.css" />
</head>
<body>

    <main class="register-container">
        <div class="card-registrarse">
            
            <!-- REQUISITO: formulario con validación básica usando JavaScript. -->
            <form id="registerForm">
              <h1>Registrarse</h1>
              
              <div class="form_group">
                <label for="user">Usuario:</label>
                <input type="text" id="user" placeholder="Usuario" required minlength="3" maxlength="15" oninput="validarRegistroDesdeHTML()" />
              </div>

              <div class="form_group">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" placeholder="example@gmail.com" required title="Ingresa un correo válido" oninput="validarRegistroDesdeHTML()" />
              </div>
              
              <div class="form_group">
                <label for="pass">Contraseña:</label>
                <input type="password" id="pass" placeholder="Contraseña" required minlength="8" oninput="validarRegistroDesdeHTML()" />
              </div>
              
              <div class="botones-acciones">
                <button type="submit" class="boton-register">Registrarse</button>
                <a href="login.html" class="boton-enlace">Iniciar Sesión</a>
              </div>
              <p class="mensaje-auth" aria-live="polite"></p>
            </form>

            <div class="login_terceros">
              <!-- REQUISITO: evento onclick visible en HTML. -->
              <div class="login_google" onclick="mostrarOAuthPendiente('Google')">
                <div class="icon-google"></div>
                <p>Registrarse con Google</p>
              </div>
              <div class="login_face" onclick="mostrarOAuthPendiente('Facebook')">
                <div class="icon_face"></div>
                <p>Registrarse con Facebook</p>
              </div>
            </div>

        </div>
    </main>
  <div class="conten">
      <div class="track">
        <div class="cinta">
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
        </div>
        <div class="cinta">
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
        </div>
      </div>
    </div>
    
    <footer class="footer">
    <div class="grid-footer">

      <!-- Columna 1 -->
      <div class="footer-section">
          <h3>Poké Café</h3>

          <img src="../main_Page/img/img_main/pokeCafe_logo.png"
              alt="Logo Poké Café"
              class="footer-logo">

          <p>¡Donde cada bocado es una evolución de sabor!</p>
      </div>

      <!-- Columna 2 -->
      <div class="footer-section">
          <h4>Explora</h4>
          <ul>
              <li><a href="menu.html">🍽 Menú PokéDex</a></li>
              <li><a href="ofertas.html">🔥 Ofertas</a></li>
              <li><a href="pedidos.html">📦 Mis pedidos</a></li>
          </ul>
          <h4 class="redes-titulo">Síguenos</h4>
          <div class="redes">
              <a href="#"><i class="fa-brands fa-instagram"></i></a>
              <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#"><i class="fa-brands fa-tiktok"></i></a>
              <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
          </div>
      </div>
    </div>
  </footer>

    <!-- REQUISITO: JavaScript incorporado en la página. -->
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
