<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú - Pokémon Café</title>
  <link rel="icon" type="image/png" href="img/img_main/pokeCafe_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/paginas/shop.css" />
</head>
<body data-page="menu">
  <!-- REQUISITO: esta página incorpora JavaScript mediante script.js y shop.js al final del documento. -->
  <header class="nav-bar">
    <!-- REQUISITO: navbar original del proyecto con enlaces y botón de modo oscuro. -->
    <div class="logo"></div>

    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="menu.html" class="active">Menu</a>
      <a href="ofertas.html">Ofertas</a>
      <a href="formulario_pedido.html">Pedir</a>
      <a href="pedidos.html">Mis Pedidos</a>
      <a href="login.html" id="accountLink">Mi cuenta</a>
    </nav>

    <div class="theme-switch" aria-label="Cambiar tema claro u oscuro">
      <label class="theme-toggle" title="Cambiar modo claro/oscuro">
        <!-- REQUISITO: evento onchange controlado desde script.js para cambiar modo claro/oscuro. -->
        <input type="checkbox" id="modoOscuro" />
        <span class="theme-slider" aria-hidden="true"></span>
      </label>
    </div>
  </header>
  <!-- REQUISITO: cinta Pokémon restaurada del diseño original. -->
  <div class="conten">
    <div class="track">
      <div class="cinta">
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
      </div>
      <div class="cinta">
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
        <img src="img/img_main/pokeCinta.jpeg" alt="Cinta decorativa Pokémon" />
      </div>
    </div>
  </div>

  <main class="shop-layout shop-layout-full">
    <section class="catalog-panel menu-panel-old">
      <div class="catalog-heading">
        <h1>Menú Pokémon Café</h1>
        <p>Elige tus productos favoritos</p>
      </div>

      <div class="toolbar menu-toolbar">
        <div class="filters" id="categoryFilters"></div>
        <!-- Se dejan solo los botones de categoría: Postres, Bebidas y Platos. -->
      </div>

      <div id="productGrid" class="product-grid"></div>
    </section>
</main>


  <!-- REQUISITO: botón flotante con evento onclick para ir al formulario de pedido. -->
  <a class="floating-cart" href="formulario_pedido.html" onclick="return confirmarIrAPedidoDesdeHTML()" aria-label="Ir al pedido">
    <span class="floating-cart-count" id="cartCount">0</span>
    <span class="floating-cart-icon">🛒</span>
  </a>
  <!-- REQUISITO: footer restaurado del diseño original del proyecto. -->
  <footer class="footer">
    <div class="grid-footer">

      <!-- Columna 1 -->
      <div class="footer-section">
          <h3>Poké Café</h3>

          <img src="../main_Page/img/img_main/pokeCafe_logo.png"
              alt="Logo Poké Café"
              class="footer-logo">

          <p>¡Donde cada bocado es una evolución de sabor!</p>
      </div>

      <!-- Columna 2 -->
      <div class="footer-section">
          <h4>Explora</h4>
          <ul>
              <li><a href="menu.html">🍽 Menú PokéDex</a></li>
              <li><a href="ofertas.html">🔥 Ofertas</a></li>
              <li><a href="pedidos.html">📦 Mis pedidos</a></li>
          </ul>
          <h4 class="redes-titulo">Síguenos</h4>
          <div class="redes">
              <a href="#"><i class="fa-brands fa-instagram"></i></a>
              <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#"><i class="fa-brands fa-tiktok"></i></a>
              <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
          </div>
      </div>
    </div>
  </footer>
<!-- REQUISITO: JavaScript incorporado en la página. -->
  <script src="js/script.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
