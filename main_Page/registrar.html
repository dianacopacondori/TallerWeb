<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Pokémon Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/paginas/registrar.css" />
</head>
<body>

    <main class="register-container">
        <div class="card-registrarse">
            
            <form id="registerForm">
              <h1>Registrarse</h1>
              
              <div class="form_group">
                <label for="user">Usuario:</label>
                <input type="text" id="user" placeholder="Usuario" required maxlength="15" />
              </div>

              <div class="form_group">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" placeholder="example@gmail.com" required pattern=".*@gmail\.com$" title="El correo debe terminar en @gmail.com" />
              </div>
              
              <div class="form_group">
                <label for="pass">Contraseña:</label>
                <input type="password" id="pass" placeholder="Contraseña" required />
              </div>
              
              <div class="botones-acciones">
                <button type="submit" class="boton-register">Registrarse</button>
                <a href="login.html" class="boton-enlace">Iniciar Sesión</a>
              </div>
            </form>

            <div class="login_terceros">
              <div class="login_google">
                <div class="icon-google"></div>
                <p>Registrarse con Google</p>
              </div>
              <div class="login_face">
                <div class="icon_face"></div>
                <p>Registrarse con Facebook</p>
              </div>
            </div>

        </div>
    </main>
  <div class="conten">
      <div class="track">
        <div class="cinta">
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
        </div>
        <div class="cinta">
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
          <img src="../main_Page/img/img_main/pokeCinta.jpeg" alt="" />
        </div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-content">
        <p>© 2026 Pokémon Café</p>
        <div class="redes">
          <a href="#">Facebook</a>
          <a href="#">Instagram</a>
          <a href="#">WhatsApp</a>
        </div>
        <p>Contacto: pokecafe@email.com</p>
      </div>
    </footer>

    <script>
      document.getElementById('registerForm').addEventListener('submit', function(event) {
          // Si todo está correcto (no está vacío, tiene máximo 15 letras y es @gmail.com)
          event.preventDefault(); 
          
          // Redirige
          window.location.href = 'index.html';
      });
    </script>
    <script src="script.js"></script>
</body>
</html>
